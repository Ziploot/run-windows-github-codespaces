name: Keep Codespace Active 24/7
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Keep-Alive to Codespace
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/codespaces/${{ secrets.CODESPACE_NAME }}/start
